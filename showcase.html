  <style>
    .showcase-section {
      padding: 120px 0 60px 0;
      min-height: 75vh;
    }
    
    .showcase-card {
      background: #0f1011;
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      border: 2px solid #232323;
      max-width: 500px;
      margin: 0 auto;
      text-decoration: none;
      display: block;
    }
    
    .showcase-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 30px rgba(229, 193, 88, 0.2);
      border-color: #e5c158;
    }
    
    .showcase-img-wrapper {
      position: relative;
      overflow: hidden;
      aspect-ratio: 16 / 10;
      background: #101010;
    }
    
    .showcase-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    
    .showcase-card:hover .showcase-img {
      transform: scale(1.05);
    }
    
    /* Play Button Overlay */
    .showcase-img-wrapper::after {
      content: '\F5B0'; /* Bootstrap icon bi-play-circle-fill */
      font-family: "bootstrap-icons";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      font-size: 3.5rem;
      color: rgba(229, 193, 88, 0.85);
      z-index: 2;
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    
    .showcase-card:hover .showcase-img-wrapper::after {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    
    .showcase-badge {
      position: absolute;
      top: 15px;
      left: 15px;
      background: #e91e63; /* Premium pink category accent matching the screenshot */
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 6px 16px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      z-index: 2;
    }
    
    .showcase-body {
      padding: 25px;
      text-align: left;
    }
    
    .showcase-title {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
    }
    
    .showcase-description {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.6;
      font-weight: 400;
      margin-bottom: 20px;
    }
    
    .showcase-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding-top: 15px;
    }
    
    .showcase-action-text {
      color: #e5c158;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: color 0.3s ease;
    }
    
    .showcase-card:hover .showcase-action-text {
      color: #fff;
    }
  </style>
